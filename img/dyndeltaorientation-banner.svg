<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0f1328"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4ade80"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" rx="16" ry="16" fill="url(#bg)"/>

  <!-- Graph: planar, no crossings
    Nodes:
      A(90,52)   B(210,52)   C(340,52)
         D(150,130)     E(270,130)
      F(90,208)  G(210,208)  H(340,208)

    Edges (oriented):
      Aâ†’B (green, A out=1)         Bâ†’C (orange, B out=3)
      Bâ†’D (orange)                 Bâ†’E (orange)
      Câ†’E (green, C out=1)        Dâ†’A (orange, D out=3)
      Dâ†’F (orange)                 Dâ†’G (orange)
      Eâ†’G (green, E out=2)        Eâ†’H (green)
      Fâ†’G (green, F out=1)        Gâ†’H (green, G out=1)

    Out-degrees: A=1, B=3, C=1, D=3, E=2, F=1, G=1, H=0
    Max out-degree = 3 (nodes B, D highlighted orange)
  -->

  <!-- Green arrows (from low out-degree nodes) -->
  <g stroke="#4ade80" stroke-width="2.2" fill="none" marker-end="url(#arrowGreen)" filter="url(#glow)">
    <!-- Aâ†’B -->
    <line x1="102" y1="52" x2="198" y2="52"/>
    <!-- Câ†’E -->
    <line x1="332" y1="62" x2="278" y2="120"/>
    <!-- Eâ†’G -->
    <line x1="262" y1="140" x2="218" y2="198"/>
    <!-- Eâ†’H -->
    <line x1="280" y1="140" x2="332" y2="198"/>
    <!-- Fâ†’G -->
    <line x1="102" y1="208" x2="198" y2="208"/>
    <!-- Gâ†’H -->
    <line x1="222" y1="208" x2="328" y2="208"/>
  </g>

  <!-- Orange arrows (from high out-degree nodes B and D) -->
  <g stroke="#f59e0b" stroke-width="2.2" fill="none" marker-end="url(#arrowOrange)" filter="url(#glow)">
    <!-- Bâ†’C -->
    <line x1="222" y1="52" x2="328" y2="52"/>
    <!-- Bâ†’D -->
    <line x1="202" y1="62" x2="158" y2="120"/>
    <!-- Bâ†’E -->
    <line x1="220" y1="62" x2="262" y2="120"/>
    <!-- Dâ†’A -->
    <line x1="142" y1="120" x2="98" y2="62"/>
    <!-- Dâ†’F -->
    <line x1="142" y1="140" x2="98" y2="198"/>
    <!-- Dâ†’G -->
    <line x1="158" y1="140" x2="202" y2="198"/>
  </g>

  <!-- Nodes: low out-degree = blue stroke, high out-degree (B,D) = orange stroke -->
  <g>
    <!-- A (out=1, green) -->
    <circle cx="90" cy="52" r="11" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <!-- B (out=3, orange) -->
    <circle cx="210" cy="52" r="11" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>
    <!-- C (out=1, green) -->
    <circle cx="340" cy="52" r="11" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <!-- D (out=3, orange) -->
    <circle cx="150" cy="130" r="11" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>
    <!-- E (out=2) -->
    <circle cx="270" cy="130" r="11" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <!-- F (out=1) -->
    <circle cx="90" cy="208" r="11" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <!-- G (out=1) -->
    <circle cx="210" cy="208" r="11" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <!-- H (out=0, sink) -->
    <circle cx="340" cy="208" r="11" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  </g>

  <!-- Legend -->
  <g transform="translate(70, 238)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <text x="28" y="4" fill="#94a3b8" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="10">Low out-degree</text>
    <line x1="150" y1="0" x2="172" y2="0" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <text x="178" y="4" fill="#94a3b8" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="10">High out-degree</text>
  </g>

  <!-- Title (right side) -->
  <text x="620" y="100" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="50" font-weight="700">
    <tspan fill="#60a5fa">Dyn</tspan><tspan fill="#e2e8f0">Delta</tspan>
  </text>
  <text x="620" y="145" text-anchor="middle" fill="#e2e8f0" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700">Orientation</text>

  <!-- Subtitle -->
  <text x="620" y="180" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-style="italic">Fully Dynamic Edge Orientation</text>
</svg>

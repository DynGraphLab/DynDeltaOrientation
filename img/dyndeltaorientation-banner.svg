<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0f1328"/>
    </linearGradient>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4ade80"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" rx="18" ry="18" fill="url(#bg)"/>

  <!-- Graph visualization (left side) -->
  <!-- Nodes -->
  <circle cx="80" cy="70" r="12" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="160" cy="45" r="12" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="200" cy="130" r="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="120" cy="160" r="12" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="50" cy="170" r="12" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="280" cy="80" r="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="300" cy="170" r="12" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="240" cy="200" r="12" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>

  <!-- Edges (oriented arrows) -->
  <!-- Low out-degree (green) edges -->
  <line x1="92" y1="66" x2="148" y2="49" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="132" y1="156" x2="188" y2="134" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="62" y1="166" x2="108" y2="164" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="312" y1="166" x2="252" y2="196" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- High out-degree (orange) edges -->
  <line x1="200" y1="118" x2="160" y2="57" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="200" y1="142" x2="130" y2="152" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="212" y1="130" x2="268" y2="84" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="280" y1="92" x2="280" y2="158" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="292" y1="80" x2="310" y2="158" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="210" y1="138" x2="232" y2="192" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Node labels -->
  <text x="80" y="74" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="600">a</text>
  <text x="160" y="49" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="600">b</text>
  <text x="200" y="134" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="600">c</text>
  <text x="120" y="164" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="600">d</text>
  <text x="50" y="174" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="600">e</text>
  <text x="280" y="84" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="600">f</text>
  <text x="300" y="174" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="600">g</text>
  <text x="240" y="204" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="600">h</text>

  <!-- Legend -->
  <line x1="60" y1="225" x2="85" y2="225" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="93" y="229" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Low out-degree</text>
  <line x1="210" y1="225" x2="235" y2="225" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="243" y="229" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">High out-degree</text>

  <!-- Title (right side) -->
  <text x="580" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="700">
    <tspan fill="#60a5fa">Dyn</tspan><tspan fill="#e2e8f0">Delta</tspan>
  </text>
  <text x="580" y="140" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="48" font-weight="700">Orientation</text>

  <!-- Subtitle -->
  <text x="580" y="175" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22" font-style="italic">Fully Dynamic Edge Orientation</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0f1328"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4ade80"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Graph: planar, no crossings (scaled from banner) -->
  <!-- A(120,120) B(320,120) C(520,120) -->
  <!--    D(220,320)    E(420,320)    -->
  <!-- F(120,520) G(320,520) H(520,520) -->

  <!-- Green arrows (from low out-degree nodes) -->
  <g stroke="#4ade80" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)" filter="url(#glow)">
    <!-- A->B -->
    <line x1="136" y1="120" x2="304" y2="120"/>
    <!-- C->E -->
    <path d="M 512,132 Q 470,220 428,308"/>
    <!-- F->G -->
    <line x1="136" y1="520" x2="304" y2="520"/>
    <!-- G->H -->
    <line x1="336" y1="520" x2="504" y2="520"/>
    <!-- E->G -->
    <path d="M 412,332 Q 370,420 328,508"/>
    <!-- E->H -->
    <path d="M 428,332 Q 470,420 512,508"/>
  </g>

  <!-- Orange arrows (from high out-degree nodes B and D) -->
  <g stroke="#f59e0b" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)" filter="url(#glow)">
    <!-- B->C -->
    <line x1="336" y1="120" x2="504" y2="120"/>
    <!-- B->D -->
    <path d="M 312,134 Q 270,220 228,308"/>
    <!-- B->E -->
    <path d="M 328,134 Q 370,220 412,308"/>
    <!-- D->A -->
    <path d="M 212,308 Q 170,220 128,134"/>
    <!-- D->F -->
    <path d="M 212,334 Q 170,420 128,508"/>
    <!-- D->G -->
    <path d="M 228,334 Q 270,420 312,508"/>
  </g>

  <!-- Nodes -->
  <!-- Low out-degree = blue stroke -->
  <circle cx="120" cy="120" r="14" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="520" cy="120" r="14" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="420" cy="320" r="14" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="120" cy="520" r="14" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="320" cy="520" r="14" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="520" cy="520" r="14" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5"/>
  <!-- High out-degree = orange stroke -->
  <circle cx="320" cy="120" r="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="220" cy="320" r="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>

  <!-- Legend -->
  <g transform="translate(100, 600)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#4ade80" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
    <text x="30" y="5" fill="#94a3b8" font-family="'DejaVu Sans', sans-serif" font-size="14">Low out-degree</text>
    <line x1="200" y1="0" x2="222" y2="0" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
    <text x="230" y="5" fill="#94a3b8" font-family="'DejaVu Sans', sans-serif" font-size="14">High out-degree</text>
  </g>

  <!-- Title -->
  <text x="660" y="195" font-family="'DejaVu Sans', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="60" font-weight="700">
    <tspan fill="#60a5fa">Dyn</tspan><tspan fill="#e2e8f0">Delta</tspan>
  </text>
  <text x="660" y="265" fill="#e2e8f0" font-family="'DejaVu Sans', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="54" font-weight="700">Orientation</text>

  <line x1="660" y1="290" x2="1220" y2="290" stroke="#334155" stroke-width="2"/>

  <text x="660" y="330" font-family="'DejaVu Sans', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" fill="#94a3b8" font-style="italic">
    Fully Dynamic Edge Orientation
  </text>

  <text x="660" y="395" font-family="'DejaVu Sans', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#607d8b">
    Exact and heuristic algorithms for
  </text>
  <text x="660" y="423" font-family="'DejaVu Sans', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#607d8b">
    fully dynamic delta-orientation
  </text>

  <rect x="660" y="470" width="170" height="30" rx="15" fill="#263238"/>
  <text x="745" y="490" font-family="'DejaVu Sans', sans-serif" font-size="14" fill="#80cbc4" text-anchor="middle">Part of DynGraphLab</text>
</svg>
